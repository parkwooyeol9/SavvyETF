services:
  - type: web
    name: savvyetf-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SUMMARY_PUBLIC_URL
        sync: false
      - key: PORT
        value: "8080"
      - key: SUMMARY_SCHEDULE_ENABLED
        value: "true"
      - key: MACRO_SCHEDULE_ENABLED
        value: "true"
      - key: MACRO_SCHEDULE_HOUR_KST
        value: "17"
      - key: GEMINI_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ETFCHECK_SCHEDULE_ENABLED
        value: "true"
      - key: ETFCHECK_POST_CLOSE_BUFFER_MINUTES
        value: "10"
      - key: ETFCHECK_POST_CLOSE_MAX_WAIT_MINUTES
        value: "45"
