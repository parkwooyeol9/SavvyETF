services:
  - type: web
    name: savvyetf-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_CHAT_ID_US
        value: "-1004323836037"
      - key: TELEGRAM_CHAT_ID_KOR
        value: "-1004386688578"
      - key: SUMMARY_PUBLIC_URL
        value: https://savvyetf-bot.onrender.com
      - key: PORT
        value: "8080"
      - key: SUMMARY_SCHEDULE_ENABLED
        value: "true"
      - key: SUMMARY_SCHEDULE_HOURS_KST
        value: "7:00"
      - key: SUMMARY_POST_CLOSE_ENABLED
        value: "false"
      - key: SUMMARY_PRE_SCHEDULE_ENABLED
        value: "true"
      - key: SUMMARY_PRE_SCHEDULE_KST
        value: "21:50"
      - key: REDDIT_SCHEDULE_ENABLED
        value: "true"
      - key: REDDIT_SCHEDULE_HOURS_KST
        value: "21"
      - key: SUMMARY_KOR_INTRA_SCHEDULE_ENABLED
        value: "true"
      - key: SUMMARY_KOR_INTRA_SCHEDULE_HOURS_KST
        value: "11"
      - key: SUMMARY_KOR_SCHEDULE_ENABLED
        value: "true"
      - key: SUMMARY_KOR_SCHEDULE_KST
        value: "15:40"
      - key: SUMMARY_NXT_SCHEDULE_ENABLED
        value: "true"
      - key: SUMMARY_NXT_SCHEDULE_KST
        value: "8:30,16:40"
      - key: ETF_SECTOR_SCHEDULE_ENABLED
        value: "true"
      - key: ETF_SECTOR_SCHEDULE_KST
        value: "8:50"
      - key: ETFCHECK_SCHEDULE_ENABLED
        value: "true"
      - key: ETFCHECK_SCHEDULE_KST
        value: "15:40"
      - key: GEMINI_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: FINMIND_TOKEN
        sync: false
      - key: EODHD_API_KEY
        sync: false
      - key: DART_API_KEY
        sync: false
      - key: SCHEDULER_STARTUP_GRACE_SECONDS
        value: "180"
      - key: BOT_DEFER_CACHE_WARMUP
        value: "true"
      - key: BOT_STARTUP_CACHE_UNIVERSES
        value: "etf,sp"
      - key: BOT_DEFERRED_CACHE_UNIVERSES
        value: "nas"
      - key: SUMMARY_CATCHUP_MINUTES
        value: "45"
      - key: SUMMARY_CACHE_WAIT_SECONDS
        value: "900"
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: MEMORY_DEBUG
        value: "true"
      - key: HEAVY_WORK_SERIALIZE
        value: "true"
      - key: SUMMARY_HEAVY_WORK_WAIT_SECONDS
        value: "600"
      - key: KAKAO_NOTIFY_ENABLED
        value: "false"
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: KAKAO_CLIENT_SECRET
        sync: false
      - key: KAKAO_REDIRECT_URI
        value: https://savvyetf-bot.onrender.com/kakao/callback
      - key: KAKAO_REFRESH_TOKEN
        sync: false
