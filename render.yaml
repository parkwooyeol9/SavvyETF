services:
  - type: web
    name: savvyetf-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SUMMARY_PUBLIC_URL
        sync: false
      - key: PORT
        value: "8080"
      - key: SUMMARY_SCHEDULE_ENABLED
        value: "true"
      - key: MACRO_SCHEDULE_ENABLED
        value: "true"
      - key: MACRO_SCHEDULE_HOUR_KST
        value: "17"
      - key: GEMINI_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: DART_API_KEY
        sync: false
      - key: SCHEDULER_STARTUP_GRACE_SECONDS
        value: "180"
      - key: BOT_DEFER_CACHE_WARMUP
        value: "true"
      - key: BOT_STARTUP_CACHE_UNIVERSES
        value: "etf"
      - key: BOT_DEFERRED_CACHE_UNIVERSES
        value: "sp,nas"
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: MEMORY_DEBUG
        value: "true"
      - key: HEAVY_WORK_SERIALIZE
        value: "true"
      - key: SUMMARY_HEAVY_WORK_WAIT_SECONDS
        value: "600"
